            'Bsus2':  { fingers:[-1,2,4,4,2,2],  barre:{fret:2,from:1,to:5} },
            // dim bar chords — [-1,N,N+1,N+2,N+2,N] (A-form dim shape)
            'Cdim':   { fingers:[-1,3,4,5,5,3],  barre:{fret:3,from:1,to:5} },
            'C#dim':  { fingers:[-1,4,5,6,6,4],  barre:{fret:4,from:1,to:5} },
            'Ddim':   { fingers:[-1,5,6,7,7,5],  barre:{fret:5,from:1,to:5} },
            'D#dim':  { fingers:[-1,6,7,8,8,6],  barre:{fret:6,from:1,to:5} },
            'Edim':   { fingers:[-1,7,8,9,9,7],  barre:{fret:7,from:1,to:5} },
            'Fdim':   { fingers:[1,2,3,3,1,1],   barre:{fret:1,from:0,to:5} },
            'F#dim':  { fingers:[2,3,4,4,2,2],   barre:{fret:2,from:0,to:5} },
            'Gdim':   { fingers:[3,4,5,5,3,3],   barre:{fret:3,from:0,to:5} },
            'G#dim':  { fingers:[-1,4,5,6,6,4],  barre:{fret:4,from:1,to:5} },
            'Adim':   { fingers:[5,6,7,7,5,5],   barre:{fret:5,from:0,to:5} },
            'A#dim':  { fingers:[-1,1,2,3,3,1],  barre:{fret:1,from:1,to:5} },
            'Bdim':   { fingers:[-1,2,3,4,4,2],  barre:{fret:2,from:1,to:5} },
        };

        // ── Piano chord database ─────────────────────────────────────────────
        // Note indices: C=0 C#=1 D=2 D#=3 E=4 F=5 F#=6 G=7 G#=8 A=9 A#=10 B=11
        const PIANO_CHORDS = {
            'C':[0,4,7],'C#':[1,5,8],'D':[2,6,9],'D#':[3,7,10],
            'E':[4,8,11],'F':[5,9,0],'F#':[6,10,1],'G':[7,11,2],
            'G#':[8,0,3],'A':[9,1,4],'A#':[10,2,5],'B':[11,3,6],
            'Am':[9,0,4],'A#m':[10,1,5],'Bm':[11,2,6],'Cm':[0,3,7],
            'C#m':[1,4,8],'Dm':[2,5,9],'D#m':[3,6,10],'Em':[4,7,11],
            'Fm':[5,8,0],'F#m':[6,9,1],'Gm':[7,10,2],'G#m':[8,11,3],
            'C7':[0,4,7,10],'D7':[2,6,9,0],'E7':[4,8,11,2],'F7':[5,9,0,3],
            'G7':[7,11,2,5],'A7':[9,1,4,7],'B7':[11,3,6,9],
            'Am7':[9,0,4,7],'Em7':[4,7,11,2],'Dm7':[2,5,9,0],
            'Bm7':[11,2,6,9],'Cm7':[0,3,7,10],'F#m7':[6,9,1,4],'Gm7':[7,10,2,5],
            'Cmaj7':[0,4,7,11],'Dmaj7':[2,6,9,1],'Emaj7':[4,8,11,3],
            'Fmaj7':[5,9,0,4],'Gmaj7':[7,11,2,6],'Amaj7':[9,1,4,8],
            'Dsus4':[2,7,9],'Asus4':[9,2,4],'Asus2':[9,11,4],
            'Esus4':[4,9,11],'Gsus4':[7,0,2],'Gsus2':[7,9,2],
        };

        // ── Dynamic piano chord calculator ───────────────────────────────────
        // Covers ANY chord name: sus2/4, dim7, aug, 7sus4, add9, maj9, m11 etc.
        function getPianoNotes(chordName) {
            if (!chordName) return null;
            const slash = chordName.indexOf('/');
            if (slash > 0) chordName = chordName.slice(0, slash);

            const ROOT_MAP = {
                'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,
                'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,
                'A':9,'A#':10,'Bb':10,'B':11
            };
            let root = null, suf = '';
            if (ROOT_MAP[chordName.slice(0,2)] !== undefined) {
                root = ROOT_MAP[chordName.slice(0,2)]; suf = chordName.slice(2);
            } else if (ROOT_MAP[chordName[0]] !== undefined) {
                root = ROOT_MAP[chordName[0]]; suf = chordName.slice(1);
            }
            if (root === null) return null;

            const m = (...iv) => iv.map(i => ((root + i) % 12 + 12) % 12);

            const map = {
                '':m(0,4,7), 'maj':m(0,4,7), 'M':m(0,4,7),
                'm':m(0,3,7), 'min':m(0,3,7),
                'maj7':m(0,4,7,11), 'M7':m(0,4,7,11), 'Maj7':m(0,4,7,11),
                'maj9':m(0,4,7,11,2), 'maj11':m(0,4,7,11,5), 'maj13':m(0,4,7,11,9),
                'm7':m(0,3,7,10), 'min7':m(0,3,7,10),
                'm9':m(0,3,7,10,2), 'm11':m(0,3,7,10,5), 'm13':m(0,3,7,10,9),
                '7':m(0,4,7,10),
                '9':m(0,4,7,10,2), '11':m(0,4,7,10,5), '13':m(0,4,7,10,9),
                'sus2':m(0,2,7), 'sus4':m(0,5,7), 'sus':m(0,5,7),
                '7sus4':m(0,5,7,10), '7sus2':m(0,2,7,10),
                'maj7sus4':m(0,5,7,11),
                'm7sus4':m(0,5,7,10),
                'dim':m(0,3,6), 'dim7':m(0,3,6,9), 'diminished':m(0,3,6),
                'm7b5':m(0,3,6,10),
                'aug':m(0,4,8), '+':m(0,4,8), 'aug7':m(0,4,8,10),
                '5':m(0,7),
                '6':m(0,4,7,9), 'm6':m(0,3,7,9),
                'add9':m(0,2,4,7), 'add2':m(0,2,4,7),
                'madd9':m(0,2,3,7),
                'mM7':m(0,3,7,11),
            };
            // Exact match first
            if (map[suf] !== undefined) return map[suf];
            // Also check PIANO_CHORDS static table
            const full = chordName.replace(/\//g,'');
            if (PIANO_CHORDS[full]) return PIANO_CHORDS[full];
            return null;
        }

        // ── SVG: Guitar chord diagram (shared renderer) ──────────────────────
        function renderGuitarDiagramSVG(data, displayName) {
            const strX = [12,27,42,57,72,87];
            const topY = 30, fretH = 18, numFrets = 4;
            const fretY = Array.from({length:numFrets+1},(_,i)=>topY+i*fretH);

            if (!data) {
                return `<svg viewBox="0 0 100 108" width="90" height="97" xmlns="http://www.w3.org/2000/svg">
                    <text x="50" y="14" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">${displayName}</text>
                    <rect x="8" y="20" width="84" height="80" rx="6" fill="#f5f5f5" stroke="#ddd"/>
                    <text x="50" y="68" text-anchor="middle" font-size="22" fill="#ccc">?</text>
                    <text x="50" y="88" text-anchor="middle" font-size="9" fill="#bbb">shape unknown</text>
                </svg>`;
            }

            const { fingers, barre } = data;
            const playedFrets = fingers.filter(f=>f>0);
            let startFret = barre ? barre.fret : (playedFrets.length ? Math.min(...playedFrets) : 1);
            const isFirstPos = startFret === 1;

            let svg = `<svg viewBox="0 0 100 108" width="90" height="97" xmlns="http://www.w3.org/2000/svg">`;
            svg += `<text x="50" y="14" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">${displayName}</text>`;

            if (isFirstPos) {
                svg += `<rect x="${strX[0]}" y="${fretY[0]-3}" width="${strX[5]-strX[0]}" height="5" fill="#222" rx="1"/>`;
            } else {
                svg += `<line x1="${strX[0]}" y1="${fretY[0]}" x2="${strX[5]}" y2="${fretY[0]}" stroke="#888" stroke-width="1.5"/>`;
                svg += `<text x="${strX[0]-8}" y="${fretY[0]+fretH/2+4}" text-anchor="middle" font-size="8" fill="#555">${startFret}fr</text>`;
            }
            for(let i=1;i<=numFrets;i++)
                svg += `<line x1="${strX[0]}" y1="${fretY[i]}" x2="${strX[5]}" y2="${fretY[i]}" stroke="#ccc" stroke-width="1"/>`;
            for(let s=0;s<6;s++)
                svg += `<line x1="${strX[s]}" y1="${fretY[0]}" x2="${strX[s]}" y2="${fretY[numFrets]}" stroke="#ccc" stroke-width="1"/>`;

            for(let s=0;s<6;s++){
                const f=fingers[s];
                if(f===-1) svg+=`<text x="${strX[s]}" y="${topY-8}" text-anchor="middle" font-size="12" fill="#c33" font-weight="bold">×</text>`;
                else if(f===0) svg+=`<circle cx="${strX[s]}" cy="${topY-9}" r="4.5" fill="none" stroke="#555" stroke-width="1.5"/>`;
            }

            if(barre){
                const {fret,from,to}=barre;
                const fi=fret-startFret;
                if(fi>=0&&fi<numFrets){
                    const cy=fretY[fi]+fretH/2;
                    svg+=`<rect x="${strX[from]-6}" y="${cy-7}" width="${strX[to]-strX[from]+12}" height="14" rx="7" fill="#333"/>`;
                }
            }

            for(let s=0;s<6;s++){
                const f=fingers[s];
                if(f>0){
                    const fi=f-startFret;
                    if(fi>=0&&fi<numFrets){
                        const isBarred=barre&&f===barre.fret&&s>=barre.from&&s<=barre.to;
                        if(!isBarred)
                            svg+=`<circle cx="${strX[s]}" cy="${fretY[fi]+fretH/2}" r="7" fill="#222"/>`;
                    }
                }
            }
            svg+='</svg>';
            return svg;
        }

        function generateGuitarSVG(chordKey, displayName) {
            return renderGuitarDiagramSVG(GUITAR_CHORDS[chordKey], displayName);
        }

        // ── SVG: Piano chord diagram ─────────────────────────────────────────
        function generatePianoSVG(notes, displayName) {
            const W=100,H=85;
            const wkW=12,wkH=48,bkW=8,bkH=30;
            const whiteNotes=[0,2,4,5,7,9,11];
            const totalW=7*wkW+6;
            const sx=(W-totalW)/2, topY=20;
            const noteSet=new Set(notes.map(n=>((n%12)+12)%12));
            const blackKeyAfter=[{a:0,n:1},{a:1,n:3},{a:3,n:6},{a:4,n:8},{a:5,n:10}];

            let svg=`<svg viewBox="0 0 ${W} ${H}" width="90" height="76" xmlns="http://www.w3.org/2000/svg">`;
            svg+=`<text x="${W/2}" y="13" text-anchor="middle" font-size="10" font-weight="bold" fill="#222">${displayName}</text>`;

            whiteNotes.forEach((note,i)=>{
                const x=sx+i*(wkW+1);
                svg+=`<rect x="${x}" y="${topY}" width="${wkW}" height="${wkH}"
                    fill="${noteSet.has(note)?'#1976d2':'white'}" stroke="#999" stroke-width="0.8" rx="2"/>`;
            });
            blackKeyAfter.forEach(({a,n})=>{
                const x=sx+a*(wkW+1)+wkW-bkW/2+0.5;
                svg+=`<rect x="${x}" y="${topY}" width="${bkW}" height="${bkH}"
                    fill="${noteSet.has(n)?'#1565c0':'#222'}" stroke="#111" stroke-width="0.5" rx="1"/>`;
            });
            svg+='</svg>';
            return svg;
        }

        // ── Chord normalization ──────────────────────────────────────────────
        function normalizeChordKey(chord) {
            const slash=chord.indexOf('/');
            if(slash>0) chord=chord.slice(0,slash);
            // Reuse existing FLAT_TO_SHARP map
            const root2=chord.slice(0,2), root1=chord[0];
            if(FLAT_TO_SHARP[root2]){ chord=FLAT_TO_SHARP[root2]+chord.slice(2); }
            else if(FLAT_TO_SHARP[root1]){ chord=FLAT_TO_SHARP[root1]+chord.slice(1); }
            chord=chord.replace(/min$/,'m').replace(/maj$/,'').replace(/^([A-G][#]?)M$/,'$1maj7');
            return chord;
        }

        // ── Extract unique chords from ANY format (inline [Am] OR chord-line) ──
        function extractAllChords(text) {
            const seen=new Set(), out=[];
            function addChord(raw) {
                if(!raw||!raw.trim()) return;
                const c=raw.trim().split('/')[0];
                if(!isValidChordToken(c)) return;
                const norm=normalizeChordKey(raw.trim());
                if(!seen.has(norm)){ seen.add(norm); out.push({display:raw.trim(),key:norm}); }
            }
            // 1. Inline [Chord] bracket format
            const brackets=text.match(/\[([^\]]+)\]/g)||[];
            brackets.forEach(m=>{
                const inner=m.slice(1,-1).trim();
                if(/^[A-G]/.test(inner)&&isValidChordToken(inner.split('/')[0])) addChord(inner);
            });
            // 2. Chord-above-lyrics lines (every token on the line is a chord)
            if(out.length===0){
                text.split('\n').forEach(line=>{
                    if(isChordLine(line)){
                        line.trim().split(/\s+/).forEach(tok=>addChord(tok));
                    }
                });
            }
            return out;
        }

        // ── Update chord diagram panel ───────────────────────────────────────
        function updateChordDiagrams() {
            const panel=document.getElementById('chordDiagramPanel');
            const rightCol=document.querySelector('.right-panel-col');
            if(!panel) return;

            const textToScan = (currentTab && (currentTab.chordsContent || currentTab.tabContent)) || '';
            if(!currentTab || !textToScan.trim()){
                panel.style.display='none';
                if(rightCol){ rightCol.classList.remove('visible'); }
                return;
            }

            const chords=extractAllChords(textToScan);
            if(chords.length===0){
                panel.style.display='none';
                if(rightCol){ rightCol.classList.remove('visible'); }
                return;
            }

            const transposed=chords.map(({display,key})=>({
                display: transposeChord(display, currentTransposeOffset),
                key: normalizeChordKey(transposeChord(key, currentTransposeOffset))
            }));

            // ── Open Chords ──────────────────────────────────────────────────
            const openChords = transposed.filter(({key}) => OPEN_CHORD_DB[key]);
            let html = '<div class="chord-panel-section">'
                + '<h4><i class="fas fa-guitar"></i> Open Chords</h4>'
                + '<div class="chord-diagrams-grid">';
            if (openChords.length > 0) {
                openChords.forEach(({display,key}) => {
                    html += `<div class="chord-diagram-item">${renderGuitarDiagramSVG(OPEN_CHORD_DB[key], display)}</div>`;
                });
            } else {
                html += '<p style="color:#aaa;font-size:0.78rem;padding:0.4rem 0;">No open shapes for current key</p>';
            }
            html += '</div></div>';

            // ── Bar Chords ───────────────────────────────────────────────────
            const barChords = transposed.filter(({key}) => BAR_CHORD_DB[key]);
            html += '<div class="chord-panel-section">'
                + '<h4><i class="fas fa-guitar"></i> Bar Chords</h4>'
                + '<div class="chord-diagrams-grid">';
            if (barChords.length > 0) {
                barChords.forEach(({display,key}) => {
                    html += `<div class="chord-diagram-item">${renderGuitarDiagramSVG(BAR_CHORD_DB[key], display)}</div>`;
                });
            } else {
                html += '<p style="color:#aaa;font-size:0.78rem;padding:0.4rem 0;">No bar shapes for current key</p>';
            }
            html += '</div></div>';

            // ── Piano ────────────────────────────────────────────────────────
            html += '<div class="chord-panel-section">'
                + '<h4><i class="fas fa-music"></i> Piano</h4>'
                + '<div class="chord-diagrams-grid">';
            transposed.forEach(({display,key})=>{
                const notes = getPianoNotes(key) || PIANO_CHORDS[key];
                if(notes){
                    html+=`<div class="chord-diagram-item">${generatePianoSVG(notes,display)}</div>`;
                } else {
                    html+=`<div class="chord-diagram-item"><div class="chord-unknown">${display}<br><small style="font-size:8px;font-weight:400">—</small></div></div>`;
                }
            });
            html+='</div></div>';

            panel.innerHTML=html;
            panel.style.display='block';
            if(rightCol){ rightCol.classList.add('visible'); }
        }

        window.updateTranspose = function (change) {
            currentTransposeOffset += change;
            console.log('🎵 Transpose updated:', currentTransposeOffset, 'steps');
            renderTabContent();
        };

        window.resetTranspose = function () {
            currentTransposeOffset = 0;
            console.log('🔄 Transpose reset to 0');
            renderTabContent();
        };

        function renderTabContent() {
            if (!currentTab) {
                console.warn('⚠️ No current tab to render');
                return;
            }
            
            const contentEl = document.getElementById('tabDisplayContent');
            const keyEl = document.getElementById('currentKeyDisplay');
            
            if (!contentEl) {
                console.error('❌ tabDisplayContent element not found');
                return;
            }

            if (currentTab.chordsContent && currentTab.chordsContent.trim()) {
                let html = parseAndRenderChords(currentTab.chordsContent, currentTransposeOffset);
                if (currentTab.tabContent && currentTab.tabContent.trim()) {
                    html += `<div style="margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e0e0e0;">
                        <p style="font-size:0.75rem;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.5rem;">Guitar Tab</p>
                        <pre style="font-family:'Courier New',monospace;font-size:0.82rem;overflow-x:auto;white-space:pre;line-height:1.7;color:#333;">${currentTab.tabContent}</pre>
                    </div>`;
                }
                contentEl.innerHTML = html;
            } else if (currentTab.tabContent && currentTab.tabContent.trim()) {
                contentEl.innerHTML = `<pre style="font-family:'Courier New',monospace;font-size:0.9rem;overflow-x:auto;white-space:pre;line-height:1.7;color:#333;">${currentTab.tabContent}</pre>`;
            } else {
                contentEl.innerHTML = `<p style="color:#aaa;text-align:center;margin-top:2rem;font-size:0.95rem;">No content available for this song.</p>`;
            }

            const originalKey = currentTab.defaultKey || 'C';
            const newKey = transposeChord(originalKey, currentTransposeOffset);
            if (keyEl) {
                keyEl.textContent = `Key: ${newKey} ${currentTransposeOffset !== 0 ? `(Original: ${originalKey})` : ''}`;
                console.log('🎼 Key updated to:', newKey);
            }

            // Render chord diagrams panel
            updateChordDiagrams();
        }

        // View tab function
        async function viewTab(tabId) {
            try {
                const response = await fetch(`${API_BASE_URL}/guitar-tabs/${tabId}`);
                const data = await response.json();

                if (data.success && data.data) {
                    currentTab = data.data;
                    currentTransposeOffset = 0;
                    
                    console.log('📂 Tab loaded:', {
                        song: currentTab.songName,
                        artist: currentTab.artist,
                        hasChords: !!currentTab.chordsContent,
                        hasLyrics: !!currentTab.lyrics,
                        defaultKey: currentTab.defaultKey
                    });

                    const modal = document.createElement('div');
                    modal.className = 'modal-overlay';
                    modal.id = 'tabModal';
                    modal.innerHTML = `
                        <div class="tab-modal full-screen">
                            <div class="modal-header">
                                <div>
                                    <h2 style="margin:0">${currentTab.songName}</h2>
                                    <p style="margin:0; font-size:0.9rem; opacity:0.8">${currentTab.artist}</p>
                                </div>
                                <button class="close-btn" onclick="closeTabModal()">&times;</button>
                            </div>
                            <div class="modal-body" style="display:flex;flex-direction:column;overflow:hidden;flex:1;">
                                <div class="transpose-controls">
                                    <div id="currentKeyDisplay" class="key-badge">Key: ${currentTab.defaultKey || 'C'}</div>
                                    <div class="btn-group">
                                        <button class="t-btn" onclick="updateTranspose(-1)">-</button>
                                        <button class="t-btn" onclick="updateTranspose(1)">+</button>
                                        <button class="t-btn reset" onclick="resetTranspose()">Reset</button>
                                    </div>
                                    <div style="margin-left:auto;display:flex;gap:0.5rem;align-items:center;">
                                        ${currentTab.audioUrl ? `
                                        <button class="play-music-btn" id="musicPlayToggle" onclick="toggleInlinePlayer()">
                                            <i class="fas fa-play"></i> Play Music
                                        </button>
                                        <div class="vol-controls" id="volControls" style="display:none;align-items:center;gap:4px;">
                                            <button class="vol-btn" onclick="adjustVolume(-10)" title="Volume Down"><i class="fas fa-volume-down"></i></button>
                                            <input type="range" id="volumeSlider" min="0" max="100" value="80" oninput="adjustVolume(0,this.value)" style="width:60px;height:3px;accent-color:#00bcd4;cursor:pointer;">
                                            <button class="vol-btn" onclick="adjustVolume(10)" title="Volume Up"><i class="fas fa-volume-up"></i></button>
                                            <span id="volumeLabel" style="font-size:0.7rem;font-weight:700;color:#00bcd4;min-width:28px;">80%</span>
                                        </div>` : ''}
                                        ${currentTab.filePath && currentTab.fileType === 'pdf' ? `
                                        <button class="open-pdf-btn" onclick="openPdfPopup('http://localhost:5000${currentTab.filePath}')">
                                            <i class="fas fa-file-pdf"></i> Open PDF
                                        </button>` : ''}
                                    </div>
                                </div>
                                ${currentTab.audioUrl ? `<div id="inlinePlayerContent" style="display:none;"></div>` : ''}

                                <div class="modal-content-area">
                                    <div class="tab-content-scroll">
                                        <div class="tab-content-viewer" id="tabDisplayContent"></div>
                                        ${currentTab.filePath && currentTab.fileType === 'image' ? `
                                        <div class="tab-file-viewer" style="margin-top:1rem;">
                                            <img src="http://localhost:5000${currentTab.filePath}" alt="Guitar Tab">
                                        </div>` : ''}
                                    </div>

                                    <div class="right-panel-col">
                                        <div id="chordDiagramPanel" class="chord-diagram-panel"></div>
                                    </div>
                                </div>
                            </div>
                        </div>`;

                    document.body.appendChild(modal);
                    document.body.style.overflow = 'hidden';
                    renderTabContent();
                }
            } catch (error) {
                console.error('Error viewing tab:', error);
                alert('Error loading tab');
            }
        }

        window.openPdfPopup = function (url) {
            const overlay = document.createElement('div');
            overlay.className = 'pdf-popup-overlay';
            overlay.id = 'pdfPopup';
            overlay.innerHTML = `
                <div class="pdf-popup">
                    <div class="pdf-popup-header">
                        <span><i class="fas fa-file-pdf"></i>&nbsp; PDF Viewer</span>
                        <button class="pdf-popup-close" onclick="document.getElementById('pdfPopup').remove()">&times;</button>
                    </div>
                    <embed src="${url}" type="application/pdf" style="flex:1; width:100%; height:100%; border:none;">
                </div>
            `;
            overlay.addEventListener('click', function (e) {
                if (e.target === overlay) overlay.remove();
            });
            document.body.appendChild(overlay);
        };

        // ── Inline Music Player ──────────────────────────────────────────────
        function buildInlineMusicPlayer(url) {
            // YouTube — compact audio-bar style (hides video, shows only controls)
            const yt = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
            if (yt) {
                return `<div class="yt-compact-wrap">
                    <iframe id="ytPlayer"
                        src="https://www.youtube.com/embed/${yt[1]}?autoplay=1&rel=0&modestbranding=1&controls=1&enablejsapi=1"
                        allow="autoplay; encrypted-media"
                        allowfullscreen></iframe>
                </div>`;
            }
            // Spotify
            if (url.includes('open.spotify.com')) {
                const embedUrl = url.replace('open.spotify.com/', 'open.spotify.com/embed/').split('?')[0];
                return `<iframe src="${embedUrl}" width="100%" height="80" style="border:none;display:block;"
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>`;
            }
            // Direct audio file
            if (/\.(mp3|ogg|wav|m4a|aac|flac)(\?.*)?$/i.test(url)) {
                return `<div style="padding:0.6rem 0.8rem;background:#111;">
                    <audio controls autoplay style="width:100%;outline:none;border-radius:4px;height:36px;">
                        <source src="${url}">
                    </audio>
                </div>`;
            }
            // Fallback link
            return `<div style="padding:0.75rem;text-align:center;background:#111;">
                <a href="${url}" target="_blank" rel="noopener"
                    style="color:#00bcd4;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:0.5rem;font-size:0.9rem;">
                    <i class="fas fa-external-link-alt"></i> Open Music Link
                </a>
            </div>`;
        }

        window.toggleInlinePlayer = function () {
            const content = document.getElementById('inlinePlayerContent');
            const toggle  = document.getElementById('musicPlayToggle');
            const volCtrl = document.getElementById('volControls');
            if (!content || !currentTab || !currentTab.audioUrl) return;

            if (content.style.display === 'none' || content.style.display === '') {
                content.innerHTML = buildInlineMusicPlayer(currentTab.audioUrl);
                content.style.display = 'block';
                toggle.innerHTML = '<i class="fas fa-stop"></i> Stop';
                toggle.style.background = '#e53935';
                if (volCtrl) volCtrl.style.display = 'flex';
            } else {
                content.innerHTML = '';
                content.style.display = 'none';
                toggle.innerHTML = '<i class="fas fa-play"></i> Play Music';
                toggle.style.background = '';
                if (volCtrl) volCtrl.style.display = 'none';
            }
        };

        window.adjustVolume = function (delta, absolute) {
            const slider = document.getElementById('volumeSlider');
            const label  = document.getElementById('volumeLabel');
            if (!slider) return;

            let vol = parseInt(slider.value);
            if (absolute !== undefined && absolute !== 0) {
                vol = parseInt(absolute);
            } else if (delta !== 0) {
                vol = Math.min(100, Math.max(0, vol + delta));
            }
            slider.value = vol;
            if (label) label.textContent = vol + '%';

            // HTML5 audio
            const audio = document.querySelector('#inlinePlayerContent audio');
            if (audio) { audio.volume = vol / 100; return; }

            // YouTube iframe via postMessage
            const ytFrame = document.getElementById('ytPlayer');
            if (ytFrame && ytFrame.contentWindow) {
                ytFrame.contentWindow.postMessage(JSON.stringify({
                    event: 'command', func: 'setVolume', args: [vol]
                }), '*');
            }
        };

        window.closeTabModal = function () {
            const modal = document.getElementById('tabModal');
            if (modal) {
                modal.remove();
                document.body.style.overflow = 'auto';
                currentTab = null;
            }
        };

        // Close modal when clicking outside
        document.addEventListener('click', function (e) {
            const modal = document.getElementById('tabModal');
            if (modal && e.target === modal) {
                closeTabModal();
            }
        });

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initPage);
    </script>

</body>

</html>
